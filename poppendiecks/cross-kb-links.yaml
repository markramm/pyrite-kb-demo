  target: pdsa-cycle-plan-do-study-act
  target_kb: deming
  relation: influenced_by
  note: "PDSA is the primary operational mechanism for amplifying learning — form hypothesis, act, study results, adjust. The Poppendiecks' learning loops are Deming cycles"

- source: learning-not-results
  target: system-of-profound-knowledge
  target_kb: deming
  relation: influenced_by
  note: "Deming's SoPK — especially theory of knowledge — is the theoretical framework underpinning the learning-not-results thesis: managing by results destroys learning capacity"

