# Cross-KB links from poppendiecks to other KBs
# The Poppendiecks are the KEY TRANSLATION LAYER between manufacturing lean (TPS/Deming)
# and software lean (Anderson/Kanban, DevOps, Lean Startup). Links reflect that role.

# === TPS — Direct source. The Poppendiecks translated TPS to software. ===

- source: seven-wastes-of-software
  target: seven-wastes-muda
  target_kb: tps
  relation: translates
  note: "Direct translation of Ohno's seven manufacturing wastes into seven software-specific waste categories — the core diagnostic tool of lean software development"

- source: pull-systems-in-software
  target: pull-production
  target_kb: tps
  relation: translates
  note: "Software pull systems translated from TPS pull production — work pulled by downstream capacity, not pushed by upstream schedule"

- source: deliver-as-fast-as-possible
  target: just-in-time
  target_kb: tps
  relation: translates
  note: "Fast delivery principle translates JIT from manufacturing to software — produce and deliver only what is needed, when it is needed"

- source: build-integrity-in
  target: jidoka
  target_kb: tps
  relation: translates
  note: "Built-in quality through TDD, CI, and automated testing translates jidoka — quality designed into the process, not inspected afterward"

- source: build-integrity-in
  target: poka-yoke
  target_kb: tps
  relation: translates
  note: "Software mistake-proofing (type systems, automated tests, CI) translates Shingo's poka-yoke — preventing defects by design rather than detecting them downstream"

- source: amplify-learning
  target: kaizen
  target_kb: tps
  relation: translates
  note: "Continuous learning through short feedback cycles translates kaizen — but the Poppendiecks reframed it from improving production to improving knowledge"

- source: value-stream-mapping-for-software
  target: value-stream
  target_kb: tps
  relation: translates
  note: "Software value stream mapping adapted from TPS material/information flow analysis; reveals that most elapsed time is waiting, not working"

- source: empower-the-team
  target: andon
  target_kb: tps
  relation: translates
  note: "Team empowerment to stop work and raise quality concerns translates the andon cord — any worker authorized to halt the production line"

- source: lean-software-development-agile-toolkit-2003
  target: tps-to-lean-software-transmission
  target_kb: tps
  relation: related_to
  note: "The 2003 book is the defining document of the TPS-to-lean-software transmission — the Poppendiecks' systematic translation methodology"

