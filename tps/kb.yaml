name: tps
description: >
  Intellectual biography of Taiichi Ohno (1912-1990) and Shigeo Shingo (1909-1990) —
  the architects of the Toyota Production System. Covers TPS core principles (Just-in-Time,
  Jidoka, the Seven Wastes, Kanban), key techniques (SMED, poka-yoke, Five Whys, Andon),
  the Toyota context (from Sakichi Toyoda's looms through the postwar reconstruction),
  intellectual influences (Ford, Deming, Shewhart), and the transmission of TPS into
  lean manufacturing, lean software development, and the broader lean movement.
kb_type: intellectual-biography

guidelines:
  contributing: |
    TPS developed inside Toyota over decades — distinguish between the system as Ohno
    practiced it (1950s-1980s) and the codified versions transmitted to the West by Womack,
    Jones, Liker, and others. Ohno's own writing is sparse and often cryptic; much TPS
    knowledge was transmitted orally through gemba practice, not publications. Shingo's
    published record is larger but the Ohno-Shingo relationship is sometimes contested —
    document both perspectives. Primary sources include Ohno's "Toyota Production System"
    (1978/1988), Shingo's books, Toyota internal documents, and accounts from Toyota
    practitioners (Fujio Cho, Teruyuki Minoura). Distinguish TPS-as-practiced-at-Toyota
    from "lean" as codified for Western audiences.
  quality: |
    Entries should trace the development of TPS practices with attention to chronology —
    many techniques evolved over decades, not as single inventions. The Ford and Deming
    influences are well-documented but often oversimplified. Ohno's supermarket insight
    (pull production) came from visiting American supermarkets, not Ford's plants. Deming's
    statistical methods were foundational but Ohno extended them in directions Deming did
    not anticipate. Prefer primary sources and Toyota practitioner accounts over Western
    lean consultancy reinterpretations.
  voice: |
    Practical and concrete. TPS is fundamentally about the shop floor — entries should
    reflect the gemba orientation of the system. Avoid abstraction without operational
    grounding. Ohno was famously terse and direct; Shingo was more systematic and
    publication-oriented. The KB should reflect both styles.

goals:
  primary: |
    Build a complete intellectual biography of TPS covering its origins (Toyoda family,
    Ford influence, Deming's Japan work), core principles and techniques, the Ohno-Shingo
    partnership, the Toyota institutional context, and the transmission path into lean
    manufacturing and lean software development.
  success_criteria: |
    A reader can trace any TPS concept from its origin through its development at Toyota
    to its adoption in lean methodology. Cross-references to Deming (statistical foundations,
    PDCA), Boyd (OODA parallel), Blank (lean startup lineage), and the lean software
    movement are explicit.

evaluation_rubric:
  - "Entry distinguishes TPS-as-practiced from lean-as-codified where the distinction matters"
  - "Claims about TPS development include approximate dates or periods"
  - "Techniques describe the operational problem they solve, not just what they are"
  - "People entries describe their specific contribution to TPS and relationship to Ohno/Shingo"
  - "Cross-KB connections to Deming, Boyd, Blank, and lean software are noted where relevant"
  - "Sources prefer Ohno's own writing, Shingo's books, and Toyota practitioner accounts"

types:
  concept:
    description: "A core principle, technique, or practice from the Toyota Production System"
    subdirectory: concepts
    required: [title]
    optional: [first_appeared, key_writings, related_concepts, research_status]
    fields:
      first_appeared:
        type: string
        description: "Approximate date or period when this concept emerged at Toyota"
      key_writings:
        type: list
        description: "Writings where this concept is described (entry IDs)"
      related_concepts:
        type: list
        description: "Related concepts (entry IDs)"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A core principle, technique, or practice from TPS. Use for concepts like
      Just-in-Time, Jidoka, the Seven Wastes (muda), Kanban, Andon, poka-yoke,
      SMED, Five Whys, heijunka (production leveling), kaizen, gemba, muri
      (overburden), mura (unevenness), one-piece flow, pull production, takt time,
      value stream, standard work, and A3 thinking. The body should explain what
      the concept does operationally, trace its development at Toyota, identify
      the problem it solves, and note how it was adopted or adapted in lean
      manufacturing and software contexts.
    evaluation_rubric:
      - "Concept explains the operational problem it solves"
      - "Origin or first_appeared is documented"
      - "Distinguishes Toyota practice from Western lean adaptation"
      - "Links to related concepts within the KB"
    display:
      icon: lightbulb
      layout: document

  writing:
    description: "A work by or substantially involving Ohno, Shingo, or key TPS practitioners"
    subdirectory: writings
    required: [title, writing_type, date]
    optional: [coauthors, publication, url, abstract, key_concepts, research_status]
    fields:
      writing_type:
        type: select
        values: [book, paper, article, lecture, interview, manual, report, memoir]
        description: "Type of writing"
      date:
        type: date
        description: "Publication or presentation date"
      coauthors:
        type: list
        description: "Co-authors or co-developers"
      publication:
        type: string
        description: "Venue, journal, or publisher"
      url:
        type: string
        description: "URL to full text if available"
      abstract:
        type: text
        description: "Abstract or brief description of the work"
      key_concepts:
        type: list
        description: "Concepts developed or discussed (entry IDs from concepts/)"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A work by or substantially involving TPS architects and practitioners.
      Ohno's published output is small — "Toyota Production System: Beyond
      Large-Scale Production" (1978/1988) is the foundational text, supplemented
      by "Workplace Management" (1982/2012) and a few articles. Shingo was more
      prolific — "A Study of the Toyota Production System" (1981/1989), "Zero
      Quality Control" (1986), and "A Revolution in Manufacturing: The SMED
      System" (1985). Also include works by key Toyota practitioners (Fujio Cho,
      Teruyuki Minoura) and the major Western codifications (Womack/Jones "The
      Machine That Changed the World," Liker "The Toyota Way"). Always include
      the date and distinguish original Japanese publication from English
      translation where applicable.
    evaluation_rubric:
      - "Writing has a date (note if Japanese original vs English translation)"
      - "Writing has a writing_type classification"
      - "Body describes the work's significance, not just its contents"
    display:
      icon: file-text
      layout: document

  era:
    description: "A period in the development of TPS or the careers of its architects"
    subdirectory: eras
    required: [title, date_range]
    optional: [key_writings, key_concepts, affiliations]
    fields:
      date_range:
        type: string
        description: "Time span, e.g. '1945-1960'"
      key_writings:
        type: list
        description: "Important writings from this period"
      key_concepts:
        type: list
        description: "Concepts developed during this period"
      affiliations:
        type: list
        description: "Institutional affiliations during this period"
    ai_instructions: >
      A period in TPS development or its architects' careers. Key eras include:
      the Toyoda family loom origins (1900s-1930s), the early Toyota Motor Company
      and wartime period (1937-1945), postwar reconstruction and Deming's influence
      (1945-1955), the development of core TPS (1955-1970), TPS maturation and
      the oil crisis validation (1970-1980), Western discovery and lean codification
      (1980-1990), and the global lean movement (1990-present).
    display:
      icon: clock
      layout: document

  person:
    description: "An individual in the TPS intellectual and professional network"
    subdirectory: people
    required: [title, role]
    optional: [affiliations, relationship_to_tps, research_status]
    fields:
      role:
        type: string
        description: "Primary role or position"
      affiliations:
        type: list
        description: "Institutional affiliations"
      relationship_to_tps:
        type: string
        description: "Nature of relationship to TPS and its architects"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How complete the profile is"
    ai_instructions: >
      A person in the TPS network — architect, Toyota practitioner, intellectual
      influence, or transmitter. Key figures include Taiichi Ohno (primary architect),
      Shigeo Shingo (co-architect, poka-yoke/SMED), Sakichi Toyoda (founder, jidoka
      origins), Kiichiro Toyoda (JIT vision), Eiji Toyoda (enabled Ohno), Fujio Cho
      (Ohno's student, Toyota Way), W. Edwards Deming (statistical foundations),
      Henry Ford (flow inspiration), James Womack and Daniel Jones (lean codification),
      Jeffrey Liker (Toyota Way codification), Mary and Tom Poppendieck (lean software),
      and Teruyuki Minoura (Toyota practitioner accounts).
    evaluation_rubric:
      - "Person has a role described"
      - "Relationship to TPS and Ohno/Shingo is explicitly stated"
      - "Person's own contributions are described, not just their connection"
    display:
      icon: user
      layout: record

  organization:
    description: "An institution relevant to TPS development or transmission"
    subdirectory: organizations
    required: [title, org_type]
    optional: [founded, location]
    fields:
      org_type:
        type: select
        values: [company, university, government, standards-body, professional-society, nonprofit, consulting, publisher]
        description: "Type of organization"
      founded:
        type: string
        description: "Year founded"
      location:
        type: string
        description: "Location"
    ai_instructions: >
      An institution relevant to TPS. Includes Toyota Motor Corporation, Toyoda
      Automatic Loom Works, Toyota suppliers (Denso, Aisin), JUSE, Ford Motor
      Company, the Lean Enterprise Institute, and organizations that adopted
      or transmitted TPS methods.
    display:
      icon: building
      layout: record

  event:
    description: "A milestone in TPS development or transmission"
    subdirectory: events
    required: [title, date]
    optional: [location, participants, status]
    fields:
      date:
        type: date
        description: "When the event occurred"
      location:
        type: string
        description: "Where it took place"
      participants:
        type: list
        description: "People or organizations involved"
      status:
        type: select
        values: [confirmed, approximate, disputed, unknown]
        description: "How certain the details are"
    ai_instructions: >
      A specific event in TPS history. Includes Ohno's early experiments with
      multi-machine operation (1940s), the supermarket visit inspiration (1956),
      the oil crisis validation (1973), Toyota winning the Deming Prize (1965),
      key publications, factory visits by Western observers, and milestones in
      the lean transmission.
    display:
      icon: calendar
      layout: record

  source:
    description: "A secondary source about TPS, Ohno, or Shingo"
    subdirectory: sources
    required: [title, source_type, date]
    optional: [author, url, publication]
    fields:
      source_type:
        type: select
        values: [book, article, chapter, interview, profile, review, dissertation, documentary, video, oral-history, case-study]
        description: "Type of secondary source"
      date:
        type: date
        description: "Publication date"
      author:
        type: string
        description: "Author"
      url:
        type: string
        description: "URL if available"
      publication:
        type: string
        description: "Publication venue"
    ai_instructions: >
      A secondary source about TPS or its architects. Key secondary sources
      include Womack/Jones/Roos "The Machine That Changed the World" (1990),
      Womack/Jones "Lean Thinking" (1996), Liker "The Toyota Way" (2004),
      Liker/Meier "The Toyota Way Fieldbook" (2005), Rother "Toyota Kata" (2009),
      and various Toyota practitioner accounts and case studies. For works by
      Ohno or Shingo, use the 'writing' type.
    display:
      icon: bookmark
      layout: document

  note:
    description: "Research notes and analysis"
    subdirectory: notes
    required: [title]
    optional: [tags]
    ai_instructions: >
      Research notes, analysis, observations, or commentary. Use for thinking
      about TPS connections to other systems — Deming's quality methods, Boyd's
      OODA loop, lean software, Agile, DevOps. Also for editorial notes on
      contested claims, chronological questions, and research gaps.
    evaluation_rubric:
      - "Note has a clear analytical thesis, not just a collection of facts"
      - "Claims and comparisons are sourced where possible"
      - "Cross-KB connections are explicit and specific"
    display:
      icon: edit
      layout: document

