name: ching
description: >
  Intellectual biography of Clarke Ching — author, consultant, and intellectual
  descendant of Eliyahu Goldratt who applies Theory of Constraints to software
  development and agile contexts. Known for accessible, narrative-driven writing
  in the Goldratt tradition of teaching through stories. Covers his books
  (Rolling Rocks Downhill, The Bottleneck Rules), key adaptations of TOC for
  knowledge work, his consulting practice, and his role in the TOC-Agile
  intersection.
kb_type: intellectual-biography

guidelines:
  contributing: |
    Ching's primary output consists of self-published books, blog posts, conference
    talks, and consulting materials. "Rolling Rocks Downhill" is a business novel in
    the Goldratt tradition; "The Bottleneck Rules" distills TOC into short accessible
    form. Blog posts at clarkching.com provide ongoing commentary. For TOC foundations,
    the Goldratt KB is the upstream source — always distinguish between Goldratt's
    original TOC formulations and Ching's software/agile adaptations. Ching is a
    smaller-scale figure than Goldratt; be accurate about the scope of his influence
    without inflating it.
  quality: |
    Ching's contribution is the translation of Goldratt's manufacturing-oriented TOC
    into software and knowledge work contexts. Entries should capture this translation
    function: what was the original TOC concept, how does Ching adapt it for software
    teams, and what is gained or lost in the translation? Avoid treating Ching as merely
    a Goldratt popularizer — he makes specific choices about what to emphasize, simplify,
    or extend for software audiences. The business novel format is itself a methodological
    choice inherited from Goldratt; document how Ching uses it.
  voice: |
    Direct, practical, and accessible — matching Ching's own unpretentious style.
    He writes for software practitioners and managers, not academics. The KB should
    reflect this applied orientation while providing analytical depth about his
    intellectual choices and contributions.

goals:
  primary: |
    Build a focused intellectual biography of Clarke Ching covering his writings,
    key translations of Goldratt's TOC for software development, his consulting
    practice, and his position in the TOC-to-Agile transmission chain. The KB
    should make explicit how TOC concepts transform when applied to knowledge work.
  success_criteria: |
    A reader can trace how specific TOC concepts were adapted by Ching for software
    contexts. Cross-references to the Goldratt KB show the upstream source.
    The KB documents Ching's specific contribution to the TOC-Agile intersection
    without overstating his influence.

evaluation_rubric:
  - "Entry distinguishes between Goldratt's original TOC concept and Ching's software adaptation"
  - "Concepts trace their Goldratt-KB upstream source explicitly"
  - "Writing entries explain the pedagogical approach and target audience"
  - "People entries describe the specific role in the TOC-to-software transmission chain"
  - "Cross-KB connections to Goldratt are noted where concepts intersect"
  - "The scope of Ching's influence is described accurately without inflation"

types:
  writing:
    description: "A work by Clarke Ching — book, blog post, article, presentation, or self-published guide"
    subdirectory: writings
    required: [title, writing_type, date]
    optional: [publication, url, abstract, key_concepts, coauthors, research_status]
    fields:
      writing_type:
        type: select
        values: [book, business-novel, article, blog-post, presentation, guide, podcast, interview, newsletter]
        description: "Type of writing"
      date:
        type: date
        description: "Publication or presentation date"
      publication:
        type: string
        description: "Publisher or venue"
      url:
        type: string
        description: "URL to the work if available"
      abstract:
        type: text
        description: "Brief description of the work"
      key_concepts:
        type: list
        description: "Concepts developed or discussed (entry IDs from concepts/)"
      coauthors:
        type: list
        description: "Co-authors if any"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A work by Clarke Ching. His major works are "Rolling Rocks Downhill" (business
      novel applying TOC to software project rescue) and "The Bottleneck Rules"
      (concise TOC guide). He also maintains a blog and has given conference talks.
      Always note the writing format — Ching follows Goldratt's tradition of teaching
      through narrative. For each work, explain what TOC concepts are translated
      and how the software/agile context changes the application.
    evaluation_rubric:
      - "Identifies TOC concepts being translated or applied"
      - "Notes the target audience (software teams, managers, agile practitioners)"
      - "Explains what's distinctive about Ching's pedagogical approach"
    display:
      icon: file-text
      layout: document

  concept:
    description: "A key idea, adaptation, or framework from Ching's work"
    subdirectory: concepts
    required: [title]
    optional: [first_appeared, key_writings, related_concepts, goldratt_source, application_domain, research_status]
    fields:
      first_appeared:
        type: string
        description: "Writing or approximate date where this concept first appears in Ching's work"
      key_writings:
        type: list
        description: "Writings where this concept is developed (entry IDs)"
      related_concepts:
        type: list
        description: "Related concepts (entry IDs)"
      goldratt_source:
        type: string
        description: "The Goldratt/TOC concept this adapts or extends (Goldratt KB entry ID or description)"
      application_domain:
        type: select
        values: [software-development, agile, project-management, knowledge-work, general-management]
        description: "Primary domain where Ching applies this concept"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A key idea or adaptation from Ching's work. Ching's primary intellectual
      contribution is translating Goldratt's manufacturing-oriented TOC into software
      and knowledge work contexts. For each concept, document: (1) what Goldratt
      concept it draws from (use goldratt_source field), (2) how Ching adapts it
      for software teams, (3) what changes when the concept moves from manufacturing
      to knowledge work. Key adaptations include identifying software constraints
      (not physical machines but skills, decisions, testing), applying the five
      focusing steps to development workflows, and using TOC to rescue troubled
      software projects.
    evaluation_rubric:
      - "Identifies the upstream Goldratt concept via goldratt_source"
      - "Explains what changes when the concept moves from manufacturing to software"
      - "Notes the application domain accurately"
    display:
      icon: lightbulb
      layout: document

  era:
    description: "A period in Ching's intellectual or professional development"
    subdirectory: eras
    required: [title, date_range]
    optional: [key_writings, key_concepts, affiliations, primary_focus]
    fields:
      date_range:
        type: string
        description: "Time span, e.g. '2000-2010'"
      key_writings:
        type: list
        description: "Important writings from this period"
      key_concepts:
        type: list
        description: "Concepts developed during this period"
      affiliations:
        type: list
        description: "Institutional affiliations during this period"
      primary_focus:
        type: string
        description: "Primary intellectual focus during this era"
    ai_instructions: >
      A period in Ching's professional and intellectual development. Ching's
      career spans software development, TOC consulting, and writing. Each era
      should capture what audience he was addressing, what TOC translations he
      was making, and how his approach to applying constraints thinking in
      software contexts evolved.
    display:
      icon: clock
      layout: document

  person:
    description: "An individual in Ching's intellectual and professional network"
    subdirectory: people
    required: [title, role]
    optional: [affiliations, relationship_to_ching, research_status]
    fields:
      role:
        type: string
        description: "Primary role or position"
      affiliations:
        type: list
        description: "Institutional affiliations"
      relationship_to_ching:
        type: string
        description: "Nature of intellectual/professional relationship to Ching"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How complete the profile is"
    ai_instructions: >
      A person in Ching's intellectual and professional network. This includes
      TOC community figures (Goldratt, other TOC practitioners and authors),
      Agile community figures, software development colleagues, and consulting
      clients or collaborators. Describe which community each person belongs to
      and how they connect to Ching's work of translating TOC for software.
    evaluation_rubric:
      - "Person has a role described"
      - "Relationship to Ching and TOC-for-software is stated"
    display:
      icon: user
      layout: record

  organization:
    description: "An institution relevant to Ching's career or intellectual context"
    subdirectory: organizations
    required: [title, org_type]
    optional: [founded, location, url]
    fields:
      org_type:
        type: select
        values: [consulting-firm, publisher, conference, software-company, toc-organization, agile-community, professional-community]
        description: "Type of organization"
      founded:
        type: string
        description: "Year founded"
      location:
        type: string
        description: "Location"
      url:
        type: string
        description: "URL"
    ai_instructions: >
      An institution relevant to Ching's career, thinking, or context. Includes
      his consulting practice, publishers, conferences where he has spoken,
      TOC community organizations (TOCICO), and Agile community organizations.
    display:
      icon: building
      layout: record

  event:
    description: "A biographical or intellectual milestone"
    subdirectory: events
    required: [title, date]
    optional: [location, participants, status]
    fields:
      date:
        type: date
        description: "When the event occurred"
      location:
        type: string
        description: "Where it took place"
      participants:
        type: list
        description: "People or organizations involved"
      status:
        type: select
        values: [confirmed, approximate, disputed, unknown]
        description: "How certain the details are"
    ai_instructions: >
      A specific event in Ching's career or intellectual trajectory. Includes
      book publications, conference presentations, career transitions, and
      milestones in the TOC-for-software community.
    display:
      icon: calendar
      layout: record

  source:
    description: "A secondary source about Ching or his work"
    subdirectory: sources
    required: [title, source_type, date]
    optional: [author, url, publication]
    fields:
      source_type:
        type: select
        values: [book, article, profile, interview, podcast, review, blog-post, academic-paper, chapter]
        description: "Type of secondary source"
      date:
        type: date
        description: "Publication date"
      author:
        type: string
        description: "Author"
      url:
        type: string
        description: "URL if available"
      publication:
        type: string
        description: "Publication venue"
    ai_instructions: >
      A secondary source about Ching or his work — reviews, interviews,
      references in other works, profiles, podcast appearances. These are
      references ABOUT Ching, not BY him (use 'writing' for Ching's own work).
    display:
      icon: bookmark
      layout: document

  note:
    description: "Research notes, analysis, and editorial observations"
    subdirectory: notes
    required: [title]
    optional: [tags]
    ai_instructions: >
      Research notes, analysis, observations, or commentary about Ching's work
      and its connections. Use for cross-KB analysis (the Goldratt-to-software
      transmission chain), research questions, and editorial observations about
      how TOC transforms when applied to knowledge work.
    display:
      icon: edit
      layout: document

relationship_types:
  # Intellectual
  influenced_by: "Intellectually influenced by"
  influenced: "Intellectually influenced"
  adapts: "Adapts concept from one domain to another"
  adapted_by: "Adapted by"
  develops: "Develops or elaborates (concept in writing)"
  developed_in: "Developed in (writing develops concept)"
  builds_on: "Builds on earlier work"
  built_upon_by: "Built upon by later work"
  critiques: "Critiques or argues against"
  critiqued_by: "Critiqued by"
  extends: "Extends a framework or concept"
  extended_by: "Extended by"
  collaborates_with: "Collaborates with"
  mentored: "Mentored"
  mentored_by: "Mentored by"

  # Standard
  authored: "Authored"
  authored_by: "Authored by"
  coauthored: "Co-authored with"
  affiliated_with: "Affiliated with"
  employed_by: "Employed by"
  member_of: "Member of"
  published_in: "Published in"
  presented_at: "Presented at"
  is_part_of: "Part of a larger whole"
  contains_part: "Contains a part"
  related_to: "Generally related"
  wikilink: "Inline wikilink reference"
  wikilinked_by: "Referenced by inline wikilink"

policies:
  qa_on_write: true
