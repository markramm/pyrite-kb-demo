links:
  # Agre → Doctorow: the capture-to-enshittification intellectual lineage
  - source: capture-model
    target: enshittification
    target_kb: doctorow
    relation: extended-by
    note: "Agre's 1994 capture model (monitoring through activity restructuring) is the theoretical precursor to Doctorow's 2023 enshittification (platforms extract value through the same mechanism)"

  - source: grammars-of-action
    target: platform-decay-cycle
    target_kb: doctorow
    relation: extended-by
    note: "Agre's grammars of action — formal representations that decompose activities into trackable steps — describe the mechanism enabling platform lock-in and decay"

  - source: institutional-analysis
    target: chokepoint-capitalism
    target_kb: doctorow
    relation: parallel-development
    note: "Both analyze concentrated intermediary power and extraction through institutional structure"

  - source: technology-as-inscription
    target: adversarial-interoperability
    target_kb: doctorow
    relation: contrasts
    note: "Agre shows how social assumptions are inscribed in technical design; Doctorow's adversarial interoperability is the practice of breaking those inscriptions"

  # Agre → Schneier: surveillance, security, and institutional failure
  - source: capture-model
    target: threat-modeling
    target_kb: schneier
    relation: parallel-development
    note: "Capture describes what data systems extract; threat modeling analyzes what adversaries can do with captured data — complementary analytical frameworks"

  - source: institutional-analysis
    target: security-economics
    target_kb: schneier
    relation: parallel-development
    note: "Both analyze how institutional structures systematically misalign incentives — Agre for governance, Schneier for security"

  # Agre → Stallman: technology encodes control
  - source: capture-model
    target: saas-loophole
    target_kb: stallman
    relation: parallel-development
    note: "Stallman's SaaS loophole identifies the structural conditions enabling Agre-style capture: server-side software removes user freedoms"

  - source: technology-as-inscription
    target: tivoization
    target_kb: stallman
    relation: parallel-development
    note: "Both analyze how technical design inscribes control — Agre theoretically, Stallman practically through hardware signing that prevents user modification"

