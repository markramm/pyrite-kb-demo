- source: flow-state
  target: lean-startup
  target_kb: blank
  relation: related_to
  note: "The Build-Measure-Learn loop creates the feedback conditions that enable flow: clear goal (build this MVP), immediate feedback (measure customer response), next challenge (learn and decide)."

- source: deliberate-practice
  target: customer-development
  target_kb: blank
  relation: related_to
  note: "Customer development is a form of deliberate practice for market understanding. It operates at the edge of current knowledge, requires immediate feedback, and builds expertise through structured repetition."

- source: flow-triggers
  target: get-out-of-the-building
