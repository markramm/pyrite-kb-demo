  relation: related_to
  note: "Blank's 'get out of the building' creates the environmental conditions — high consequence, rich environment, clear goal — that Kotler identifies as reliable flow triggers."

# flow → wardley

- source: autonomy-mastery-purpose
  target: doctrine
  target_kb: wardley
  relation: related_to
  note: "Wardley's doctrine explicitly includes 'provide purpose/mastery/autonomy' as a universal organizational principle — Pink's framework embedded verbatim in Wardley's doctrine categories."

- source: slack-demarco
  target: inertia
  target_kb: wardley
  relation: related_to
  note: "DeMarco's slack argument and Wardley's inertia address the same organizational failure from different directions. A fully optimized system has no capacity for the reflection that would allow reorientation. Slack is the prerequisite for escaping inertia."

- source: flow-triggers
  target: appropriate-methods
  target_kb: wardley
  relation: related_to
  note: "Wardley's appropriate-methods doctrine maps onto distinct flow-trigger requirements. Pioneer/genesis work requires novelty, consequence, and autonomy triggers; town-planner/commodity work produces flow through mastery and rhythm."

- source: psychological-safety
  target: pioneer-settler-town-planner
  target_kb: wardley
  relation: related_to
  note: "Pioneer work in the genesis stage requires psychological safety as a necessary condition. Without safety to fail, pioneer teams will not attempt genuine exploration. The PST model implies different psychological safety regimes for each stage."

# flow → red-rock-eater

- source: dark-side-of-flow
  target: capture-model
  target_kb: red-rock-eater
  relation: related_to
  note: "Agre's capture model describes how institutions impose formal activity grammars for behavioral tracking; the dark side of flow documents how the same flow-triggering conditions are deliberately engineered by attention-economy systems for commercial extraction."

- source: flow-in-games
  target: capture-model
  target_kb: red-rock-eater
  relation: related_to
  note: "Chen's flow-in-games framework describes the same design logic that attention-economy systems use for behavioral capture. Chen intended it for player flourishing; commercial design applies the same techniques for monetization. The capture model explains the institutional mechanism; flow-in-games provides the psychological blueprint."
