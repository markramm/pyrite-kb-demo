  target: business-novel-as-pedagogy
  target_kb: ching
  relation: continued_by
  note: "Ching continues Goldratt's tradition of teaching through business novels, applying the format to software delivery scenarios."

- source: theory-of-constraints
  target: toc-for-software-development
  target_kb: ching
  relation: extended_by
  note: "Ching's overarching framework translates TOC from manufacturing into software delivery, identifying invisible knowledge-work constraints that differ fundamentally from factory bottlenecks."

- source: the-goal
  target: rolling-rocks-downhill
  target_kb: ching
  relation: influenced
  note: "Rolling Rocks Downhill is a direct structural descendant of The Goal, applying TOC to a software project crisis using the same Socratic novel format Goldratt pioneered."

- source: throughput-accounting
  target: dollarize-the-prize
