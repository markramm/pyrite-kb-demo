# === Meadows ===
- source: theory-of-constraints
  target: leverage-points
  target_kb: meadows
  relation: parallel_to
  note: "TOC's constraint is a leverage point in Meadows's hierarchy (levels 5-6: rules and information flows). Both seek maximum effect from focused intervention rather than dispersed improvement."

- source: throughput-world-vs-cost-world
  target: leverage-points
  target_kb: meadows
  relation: parallel_to
  note: "Switching from cost-world to throughput-world is a paradigm shift — Meadows's leverage point #2 (mindset change). Goldratt's most powerful intervention is changing how managers think, not changing processes."

- source: current-reality-tree
  target: feedback-loops
  target_kb: meadows
  relation: related_to
  note: "CRTs map cause-and-effect chains that often reveal feedback dynamics. Meadows's formal feedback loop analysis provides the systems dynamics foundation for the causal structures Goldratt's TP tools surface."

- source: buffer-management
  target: stocks-and-flows
  target_kb: meadows
  relation: related_to
  note: "TOC's buffers are stocks (inventory accumulations) that protect flow through the constraint. Meadows's stocks-and-flows framework provides the formal modeling language for the accumulation dynamics Goldratt manages intuitively."

# === Senge ===
- source: current-reality-tree
  target: causal-loop-diagrams
  target_kb: senge
  relation: parallel_to
  note: "Both are tools for mapping cause-and-effect relationships in complex systems. CRTs use linear if-then logic converging on root causes; CLDs use circular feedback notation. Different visual grammars for systems diagnosis."

- source: thinking-processes
  target: systems-thinking-fifth-discipline
  target_kb: senge
  relation: parallel_to
  note: "Both are structured frameworks for diagnosing systemic problems. Goldratt's TP suite and Senge's systems thinking fifth discipline address the same challenge: helping practitioners see structure behind events."

- source: five-focusing-steps
  target: leverage-points
  target_kb: senge
  relation: parallel_to
  note: "Finding the constraint parallels finding leverage points — both seek the single point of maximum systemic impact. Goldratt operationalizes this for throughput; Senge for organizational learning."

- source: evaporating-cloud
  target: mental-models
  target_kb: senge
  relation: parallel_to
  note: "Both tools surface hidden assumptions that drive dysfunctional behavior. The evaporating cloud exposes assumptions sustaining persistent conflicts; Senge's mental models discipline exposes tacit beliefs that limit organizational learning."

- source: policy-constraints
  target: growth-and-underinvestment
  target_kb: senge
  relation: related_to
  note: "TOC's policy constraints (rules that become the binding limit) map to the growth-and-underinvestment archetype where management policies prevent investment in the capacity constraint, normalizing declining performance."

# === Boyd ===
- source: thinking-processes
  target: ooda-loop
  target_kb: boyd
  relation: parallel_to
  note: "Both are structured frameworks for diagnosing and acting on complex situations. Goldratt's TP logic trees share Boyd's emphasis on orientation before action — understanding the system before intervening."

- source: five-focusing-steps
  target: schwerpunkt
  target_kb: boyd
  relation: parallel_to
  note: "Both concepts focus effort on the decisive point. TOC's constraint is the system's schwerpunkt — the point where concentrated effort produces disproportionate results."

- source: drum-buffer-rope
  target: tempo
  target_kb: boyd
  relation: related_to
  note: "Both optimize for throughput speed. DBR paces the system to maximize flow through the constraint; Boyd's tempo concept seeks to cycle faster than the adversary. Both recognize that system speed is governed by the binding limit."

# === Wardley ===
- source: theory-of-constraints
  target: situational-awareness
  target_kb: wardley
  relation: related_to
  note: "Both insist on understanding the system before acting. TOC's identify-the-constraint step and Wardley's situational awareness both argue that most organizations act without knowing where their binding limit or competitive position actually is."

- source: policy-constraints
  target: inertia
  target_kb: wardley
  relation: related_to
  note: "TOC's policy constraints (rules that outlive their usefulness) parallel Wardley's inertia (organizational resistance to evolutionary change). Both identify past success as the source of current dysfunction."

- source: five-focusing-steps
  target: value-chain
  target_kb: wardley
  relation: related_to
  note: "TOC's constraint identification within a production system parallels Wardley's value chain analysis — both map dependencies to find where intervention matters most for delivering value."
