- source: eliyahu-goldratt
  target: eliyahu-goldratt
  target_kb: ching
  relation: same-subject
  note: "Ching's perspective on Goldratt as intellectual mentor and direct influence on his entire body of work."

- source: gene-kim
  target: gene-kim
  target_kb: ching
