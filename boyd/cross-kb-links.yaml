# boyd → goldratt (3 links)
# ============================================================

- source: tempo
  target: theory-of-constraints
  target_kb: goldratt
  relation: related_to
  note: "Boyd's tempo optimization and Goldratt's constraint management both focus on throughput rather than local efficiency. Boyd argues that competitive advantage comes from faster cycling; Goldratt argues that system performance is governed by its binding constraint. Both reject the cost-world paradigm of optimizing every component in favor of optimizing the system's rate of goal achievement."

- source: schwerpunkt
  target: five-focusing-steps
  target_kb: goldratt
  relation: related_to
  note: "Boyd's Schwerpunkt — concentrating effort at the decisive point — parallels Goldratt's five focusing steps, which direct all organizational attention to the binding constraint. Both argue that scattered effort is worse than no effort at all: the key is identifying where focused action produces maximum leverage."

- source: destruction-and-creation-concept
  target: throughput-world-vs-cost-world
  target_kb: goldratt
  relation: related_to
  note: "Boyd's destruction-and-creation of mental models parallels Goldratt's paradigm shift from cost-world to throughput-world thinking. Both describe the psychologically difficult act of abandoning a familiar cognitive framework — local optimization thinking — and replacing it with a systems-level perspective that produces superior results."

