# boyd → senge (5 links)
# ============================================================

- source: destruction-and-creation-concept
  target: mental-models
  target_kb: senge
  relation: related_to
  note: "Boyd's destruction-and-creation of mental models directly parallels Senge's mental models discipline. Both argue that implicit cognitive frameworks shape perception and action, and that organizations must systematically surface and rebuild these frameworks. Boyd frames it as competitive epistemology; Senge frames it as organizational learning."

- source: orientation
  target: systems-thinking-fifth-discipline
  target_kb: senge
  relation: related_to
  note: "Both concern how observers construct and update models of reality — Boyd through orientation, Senge through systems thinking. Both warn that linear, event-focused mental models produce systematically wrong responses to complex situations."

- source: schwerpunkt
  target: shared-vision
  target_kb: senge
  relation: related_to
  note: "Boyd's Schwerpunkt and Senge's shared vision solve the same organizational problem: how to enable decentralized action with strategic coherence. Schwerpunkt provides the operational focus; shared vision provides the collective alignment. Both are prerequisites for distributed initiative without fragmentation."

- source: einheit
  target: team-learning
  target_kb: senge
  relation: related_to
  note: "Boyd's Einheit (mutual trust as organizational foundation) maps to Senge's team learning discipline. Both recognize that organizational effectiveness requires a level of collective trust and cognitive alignment that goes beyond formal coordination — shared orientation that enables implicit collaboration."

- source: ooda-loop
  target: learning-organization
  target_kb: senge
  relation: related_to
  note: "Boyd's OODA loop and Senge's learning organization both describe entities that maintain competitive advantage through superior learning rate. The OODA loop specifies the mechanism (faster observation-orientation-decision-action cycling); the learning organization specifies the organizational form (five disciplines enabling collective learning)."

