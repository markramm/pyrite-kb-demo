# boyd → reinertsen (5 links)
# ============================================================

- source: tempo
  target: fast-feedback
  target_kb: reinertsen
  relation: related_to
  note: "Reinertsen's fast feedback principle parallels Boyd's tempo concept — both argue that the rate of cycling through observe-decide-act (or build-measure-learn) is the critical competitive variable. Reinertsen quantifies what Boyd stated qualitatively: each increment of feedback delay has a measurable economic cost."

- source: auftragstaktik
  target: decentralized-control
  target_kb: reinertsen
  relation: related_to
  note: "Reinertsen's decentralized control draws directly on Boyd's Auftragstaktik — mission-type orders that push decision authority to the lowest competent level. Both argue that centralized control is too slow for fast-changing, information-rich environments. Reinertsen adds the queueing argument: centralized decision-makers are bottlenecks with high utilization."

- source: tempo
  target: batch-size-reduction
  target_kb: reinertsen
  relation: related_to
  note: "Reinertsen's batch-size reduction is the operational mechanism for accelerating Boyd's tempo in product development. Smaller batches complete faster, enabling more rapid OODA cycling. Reinertsen provides the economic theory (U-curve optimization) that explains why smaller batches compound into competitive advantage."

- source: tempo
  target: cost-of-delay
  target_kb: reinertsen
  relation: related_to
  note: "Reinertsen's cost-of-delay framework quantifies what Boyd expressed qualitatively: the economic value of operating at superior tempo. Every unit of time saved in feedback cycles has a measurable dollar value. Boyd argued tempo wins wars; Reinertsen proved tempo creates profit."

- source: maneuver-warfare
  target: blitzkrieg-product-development
  target_kb: reinertsen
  relation: related_to
  note: "Reinertsen's 1985 'Blitzkrieg Product Development' article explicitly borrows Boyd's military terminology to argue that development speed has quantifiable economic value. The article transferred the maneuver warfare emphasis on tempo and rapid decisive action into product development management."

