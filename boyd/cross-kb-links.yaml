# boyd → meadows (4 links)
# ============================================================

- source: ooda-loop
  target: feedback-loops
  target_kb: meadows
  relation: related_to
  note: "The OODA loop is fundamentally a feedback loop: observe-orient-decide-act feeds results back into observation. Meadows's taxonomy of feedback mechanisms provides the systems-theoretic framework for understanding what Boyd described operationally as competitive cycling."

- source: destruction-and-creation-concept
  target: leverage-points
  target_kb: meadows
  relation: related_to
  note: "Boyd's destruction and creation of mental models directly parallels Meadows's highest leverage points: #2 (the mindset or paradigm out of which the system arises) and #1 (the power to transcend paradigms). Both describe the cognitive operation of breaking and rebuilding the framework through which one sees the world."

- source: implicit-guidance-and-control
  target: self-organization
  target_kb: meadows
  relation: related_to
  note: "Boyd's implicit guidance and control — organizations acting coherently without centralized command — is a form of self-organization in Meadows's taxonomy. Both describe the system property of generating adaptive behavior from distributed interaction rather than centralized direction."

- source: tempo
  target: delays-in-systems
  target_kb: meadows
  relation: related_to
  note: "Boyd's tempo advantage — acting faster than the adversary can reorient — connects to Meadows's analysis of delays in feedback systems. Delays degrade system responsiveness; reducing them increases adaptive capacity. Boyd optimizes for cycle speed in competitive contexts; Meadows analyzes how delay length shapes oscillation and overshoot in all systems."

