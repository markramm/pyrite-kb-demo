- source: orientation
  target: security-mindset
  target_kb: schneier
  relation: related_to
  note: "Schneier's security mindset — the cognitive orientation trained to see failure modes rather than intended functions — is a specific type of Boyd's orientation. Both are frameworks for how trained perception shapes what an actor notices. Boyd orients to competitive advantage; Schneier orients to adversarial vulnerability."

- source: ooda-loop
  target: threat-modeling
  target_kb: schneier
  relation: related_to
  note: "Threat modeling structures adversarial observation and orientation — how do attackers observe a system, orient to its vulnerabilities, decide on attack vectors, and act? Boyd's OODA loop provides the complementary framework for understanding attacker decision cycles and for defense-side cycling to stay ahead of adaptive adversaries."

