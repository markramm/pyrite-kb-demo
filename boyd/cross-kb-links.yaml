  target_kb: richards
  relation: translated_by
  note: "Richards' essay corrects the common misreading of OODA as a simple speed-of-decision cycle, restoring Boyd's emphasis on orientation as the dominant element that shapes and is shaped by the entire loop."

- source: patterns-of-conflict
  target: certain-to-win
  target_kb: richards
  relation: translated_by
  note: "Certain to Win translates the strategic principles from Patterns of Conflict — Boyd's sprawling military strategy briefing — into business strategy language, making the maneuver warfare framework accessible to non-military audiences."

- source: tempo
  target: boyd-toyota-connection
  target_kb: richards
  relation: related_to
  note: "Richards argues Toyota's sustained competitive advantage comes from operating inside competitors' decision cycles — applying Boyd's tempo concept to manufacturing. Toyota's OODA-loop learning rate, embedded in its organizational climate, explains what Deming's quality philosophy helped create."

- source: schwerpunkt
  target: schwerpunkt-as-focus
  target_kb: richards
  relation: translated_by
  note: "Richards translated Boyd's Schwerpunkt — the German military concept of focal point of effort — into business terms: sprint goals, product vision, and team alignment mechanisms that enable autonomous action with strategic coherence."

- source: fingerspitzengefuehl
  target: fingerspitzengefuehl-as-expertise
  target_kb: richards
  relation: translated_by
  note: "Richards translated Boyd's Fingerspitzengefuehl — the intuitive 'fingertip feel' of experienced commanders — into the tacit practitioner knowledge and expert judgment that business and software teams need to operate without comprehensive procedural guidance."

- source: maneuver-warfare
  target: agile-as-maneuver-warfare
  target_kb: richards
  relation: translated_by
  note: "Richards' structural parallel between Agile software development and maneuver warfare doctrine argues that Agile practices are effective for the same structural reasons as maneuver warfare: both instantiate Boyd's organizational climate and OODA loop principles."

- source: auftragstaktik
  target: organizational-climate-for-business
  target_kb: richards
  relation: translated_by
  note: "Richards translated Boyd's Auftragstaktik — mission-type orders that push decision authority to the lowest competent level — into the organizational climate principles that enable business agility: trust, expertise, and shared focus."

