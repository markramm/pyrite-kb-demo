  target: security-mindset
  target_kb: schneier
  relation: related_to
  note: "Boyd's mismatch — creating divergence between an adversary's mental models and reality — is the attacker's strategy that Schneier's security mindset is designed to counter. The security mindset anticipates how attackers will create mismatch between a system's intended behavior and actual exploitable behavior."

