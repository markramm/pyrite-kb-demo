# Cross-KB links from boyd to other KBs
# Expanded to reflect Boyd's role as a major hub thinker

# ============================================================
# boyd → deming (6 links)
# ============================================================

- source: ooda-loop
  target: pdsa-cycle-plan-do-study-act
  target_kb: deming
  relation: related_to
  note: "Parallel iterative learning cycles from different domains. OODA emphasizes competitive tempo and orientation; PDSA emphasizes epistemic rigor and prediction. Both treat the cognitive step (Orient/Study) as the critical element that determines the quality of subsequent action."

- source: orientation
  target: system-of-profound-knowledge
  target_kb: deming
  relation: related_to
  note: "Boyd's orientation — the lens of mental models, cultural traditions, and previous experience through which all observation is filtered — parallels Deming's SoPK insistence that theory precedes observation. Both frameworks argue that how you see determines what you see and what you do."

- source: orientation
  target: theory-of-knowledge
  target_kb: deming
  relation: related_to
  note: "Deming's theory of knowledge — derived from C.I. Lewis's pragmatic epistemology — provides the philosophical grounding for what Boyd captures operationally in orientation. Both recognize that observation without theory is meaningless; the quality of one's conceptual framework determines the quality of one's perception."

- source: tempo
  target: pdsa-cycle-plan-do-study-act
  target_kb: deming
  relation: related_to
  note: "Boyd's tempo concept — operating at a faster rhythm than one's environment or adversary — finds its quality-management implementation in Deming's PDSA cycle. Faster, better-calibrated PDSA cycles compound into competitive advantage through superior learning rate."

- source: einheit
  target: the-14-points-for-management
  target_kb: deming
  relation: related_to
  note: "Boyd's Einheit (mutual trust) maps directly to Deming's Points 8 (drive out fear), 9 (break down barriers between departments), and 12 (remove barriers to pride of workmanship). Both frameworks recognize that organizational trust is a prerequisite for effective adaptation."

- source: implicit-guidance-and-control
  target: appreciation-for-a-system
  target_kb: deming
  relation: related_to
  note: "Boyd's implicit guidance and control — the organizational capacity to act coherently without explicit commands — requires what Deming calls appreciation for a system. Without shared understanding of how the whole system works, implicit coordination degenerates into local optimization."

