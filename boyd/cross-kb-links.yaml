- source: ooda-loop
  target: kaizen
  target_kb: tps
  relation: related_to
  note: "Boyd's OODA loop and Toyota's kaizen are parallel continuous-improvement cycles from different traditions. Both insist on iterative learning through rapid cycling: observe the current state, orient to the gap, decide on improvement, act and re-observe. Boyd himself studied Toyota and recognized TPS as a manifestation of OODA-loop thinking."

- source: tempo
  target: just-in-time
  target_kb: tps
  relation: related_to
  note: "Boyd's tempo concept — operating at a faster rhythm than competitors — finds its manufacturing expression in Toyota's just-in-time system. JIT eliminates batch-and-queue delays, producing faster material and information flow. Richards explicitly connected Boyd's tempo to Toyota's competitive advantage through speed of organizational learning."

- source: auftragstaktik
  target: andon
  target_kb: tps
  relation: related_to
  note: "Boyd's Auftragstaktik — pushing decision authority to the point of contact — parallels the andon system's empowerment of line workers to stop production when they detect problems. Both require a trust-based culture (Einheit) where people at the lowest level are expected to exercise judgment without waiting for hierarchical approval."

