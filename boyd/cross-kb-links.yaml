# boyd → wardley (6 links)
# ============================================================

- source: ooda-loop
  target: strategy-cycle
  target_kb: wardley
  relation: influenced
  note: "Wardley's Strategy Cycle (Purpose, Landscape, Climate, Doctrine, Leadership) is explicitly modeled on Boyd's OODA loop. Wardley describes it as the 'outer cycle' of his framework — the insistence that strategy is a continuous process of observation, orientation, decision, and action."

- source: orientation
  target: situational-awareness
  target_kb: wardley
  relation: related_to
  note: "Boyd's emphasis on orientation as the critical OODA element parallels Wardley's insistence on situational awareness as the foundation of strategy. Both argue that most organizations fail not from bad decisions but from bad understanding of their situation."

- source: schwerpunkt
  target: doctrine
  target_kb: wardley
  relation: related_to
  note: "Boyd's Schwerpunkt — the unifying focus that enables decentralized coherence — parallels Wardley's doctrine: universal organizational principles that, once internalized, enable faster action without central deliberation. Both solve the same coordination problem."

- source: orientation
  target: inertia
  target_kb: wardley
  relation: related_to
  note: "Boyd's concept of failed orientation — mental models that no longer match reality — maps directly to Wardley's concept of inertia. Both describe how past success creates rigidity that prevents adaptation to changed circumstances."

- source: maneuver-warfare
  target: gameplay
  target_kb: wardley
  relation: related_to
  note: "Boyd's maneuver warfare — defeating adversaries through tempo, surprise, and focus rather than attrition — parallels Wardley's gameplay: context-dependent strategic moves that exploit landscape position. Both emphasize indirect, adaptive action over brute-force competition."

- source: auftragstaktik
  target: pioneer-settler-town-planner
  target_kb: wardley
  relation: related_to
  note: "Boyd's Auftragstaktik (mission-type orders enabling decentralized execution) and Wardley's Pioneer-Settler-Town Planner model both argue for decentralized execution enabled by shared intent — different organizational cultures operating autonomously but coherently toward a common purpose."

