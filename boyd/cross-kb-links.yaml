# boyd → rao (7 links)
# ============================================================

- source: ooda-loop
  target: tempo
  target_kb: rao
  relation: influenced
  note: "Rao's Tempo framework reinterprets Boyd's OODA loop through narrative theory, arguing that decision-making tempo is fundamentally about imposing narrative structure on unfolding events rather than cycling through discrete observe-orient-decide-act steps."

- source: orientation
  target: narrative-driven-decision-making
  target_kb: rao
  relation: influenced
  note: "Rao's narrative-driven decision-making extends Boyd's orientation concept by arguing that narratives — not just mental models — are the primary mechanism through which orientation shapes observation and action."

- source: destruction-and-creation-concept
  target: the-boydian-dialectic
  target_kb: rao
  relation: related_to
  note: "Rao's Boydian Dialectic essay engages directly with Boyd's Destruction and Creation thesis, reframing the entropy-cognition argument as a dialectical process of narrative construction and dissolution."

- source: tempo
  target: tempo-book
  target_kb: rao
  relation: influenced
  note: "Rao's Tempo book generalizes Boyd's concept of operating tempo from military contexts to a universal theory of narrative-driven timing across all decision domains."

- source: orientation
  target: refactored-perception
  target_kb: rao
  relation: influenced
  note: "Rao's refactored perception names the specific cognitive mechanism of orientation update — the discontinuous reframe that Boyd's framework implies but does not name. It is the individual cognitive analogue of Boyd's destruction-and-creation epistemology."

- source: discourse-on-winning-and-losing
  target: boyd-and-beyond-2012
  target_kb: rao
  relation: related_to
  note: "Rao presented at the Boyd and Beyond conference at Quantico in 2012, testing his narrative-OODA synthesis against the military community that takes Boyd's Discourse most seriously. The conference validated Rao's reading of Boyd as a narrative theorist."

- source: mismatch
  target: legibility
  target_kb: rao
  relation: related_to
  note: "Boyd's mismatch — the divergence between an actor's orientation and reality — connects to Rao's legibility analysis. Legibility creates rigid orientation that resists refactored perception; illegibility creates the conditions for mismatch that Boyd identified as the central weapon of competitive strategy."

