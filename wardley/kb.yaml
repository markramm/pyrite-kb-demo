name: wardley
description: >
  Intellectual biography of Simon Wardley — strategist, researcher, and creator
  of Wardley Mapping. Covers the development of his strategic mapping framework,
  its intellectual roots (Sun Tzu, Boyd, evolution theory), core concepts
  (value chains, evolution, situational awareness, doctrine, climate, gameplay),
  career from genetics through Fotango/Zimki to UK government advisory work,
  and the framework's adoption across technology strategy, government, and business.
kb_type: intellectual-biography

guidelines:
  contributing: |
    Wardley's work is unusually well-documented through his blog (blog.gardeviance.org) and
    book (Wardley Maps, CC-BY-SA). Prefer these primary sources over third-party summaries.
    When citing specific numbers (e.g., 61 gameplay forms, 31 climate patterns), verify against
    the blog posts where Wardley published the definitive lists. His career history has some
    ambiguities (COO vs CEO at Fotango, exact dates at LEF) — document uncertainty explicitly.
  quality: |
    The mapping framework is deeply structured — doctrine has categories and phases, gameplay
    has categories and forms, climate has domains and patterns. Entries should capture this
    structure precisely rather than summarizing loosely. Wardley's own terminology should be
    used (e.g., "evolution" not "maturity," "situational awareness" not "market analysis").
  voice: |
    Clear and analytical. Wardley's own writing style is conversational and blog-native —
    the KB should be more structured while preserving the accessibility of his ideas.

goals:
  primary: |
    Build a complete intellectual biography of Simon Wardley covering the development of
    Wardley Mapping, its intellectual roots, core concepts, career context, and the
    framework's adoption and critique.
  success_criteria: |
    A strategist unfamiliar with Wardley Mapping can navigate from any entry to understand
    the framework's structure and application. Entries accurately reflect the current state
    of the framework (which Wardley continues to develop). Cross-references to Boyd (strategy),
    Blank (business model validation), and other KBs are explicit.

evaluation_rubric:
  - "Entry cites a primary source (blog.gardeviance.org, Wardley Maps book, or named talk)"
  - "Concepts use Wardley's own terminology consistently"
  - "Numerical claims (counts of patterns, forms, etc.) are verified against source lists"
  - "People entries describe the specific relationship to Wardley or his framework"
  - "Career claims note source and certainty level where details are ambiguous"

types:
  writing:
    description: "A work by or substantially involving Simon Wardley — book, paper, blog post, talk, or presentation"
    subdirectory: writings
    required: [title, writing_type, date]
    optional: [coauthors, publication, url, abstract, key_concepts, research_status]
    fields:
      writing_type:
        type: select
        values: [book, paper, blog-post, talk, presentation, report, video, podcast, chapter]
        description: "Type of writing"
      date:
        type: date
        description: "Publication or presentation date"
      coauthors:
        type: list
        description: "Co-authors or co-developers"
      publication:
        type: string
        description: "Venue, platform, or publication context"
      url:
        type: string
        description: "URL to full text or recording if available"
      abstract:
        type: text
        description: "Abstract or brief description of the work"
      key_concepts:
        type: list
        description: "Concepts developed or discussed (entry IDs from concepts/)"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A work authored by or substantially involving Simon Wardley. Wardley's primary
      output is his Medium book (published chapter-by-chapter), his blog "Bits or pieces?",
      conference talks (notably "Crossing the River by Feeling the Stones"), and co-authored
      policy papers (notably "Better for Less"). He has not published a traditional book.
      Use writing_type to classify. Link key_concepts to concept entries.
    display:
      icon: file-text
      layout: document

  concept:
    description: "A key idea, framework, or intellectual contribution"
    subdirectory: concepts
    required: [title]
    optional: [first_appeared, key_writings, related_concepts, research_status]
    fields:
      first_appeared:
        type: string
        description: "Writing or approximate date where this concept first appears"
      key_writings:
        type: list
        description: "Writings where this concept is developed (entry IDs)"
      related_concepts:
        type: list
        description: "Related concepts (entry IDs)"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A key idea, theoretical framework, or intellectual contribution from Wardley's work.
      Use for concepts like 'evolution', 'value chain mapping', 'situational awareness',
      'doctrine', 'climate patterns', 'gameplay', 'strategy cycle', 'pioneer-settler-town planner',
      etc. Link to the writings where the concept is developed and to related concepts.
      The body should explain the concept, its development, and its significance.
      Wardley draws on evolutionary economics, Sun Tzu, Boyd's OODA loop, and systems thinking.
    display:
      icon: lightbulb
      layout: document

  era:
    description: "A period in Wardley's intellectual or professional development"
    subdirectory: eras
    required: [title, date_range]
    optional: [key_writings, key_concepts, affiliations]
    fields:
      date_range:
        type: string
        description: "Time span, e.g. '2005-2010'"
      key_writings:
        type: list
        description: "Important writings from this period"
      key_concepts:
        type: list
        description: "Concepts developed during this period"
      affiliations:
        type: list
        description: "Institutional affiliations during this period"
    ai_instructions: >
      A period in Simon Wardley's intellectual or professional development. Use to
      organize the narrative arc of his career and thinking. Link to key writings
      and concepts from the period.
    display:
      icon: clock
      layout: document

  person:
    description: "An individual in Wardley's intellectual and professional network"
    subdirectory: people
    required: [title, role]
    optional: [affiliations, relationship_to_wardley, research_status]
    fields:
      role:
        type: string
        description: "Primary role or position"
      affiliations:
        type: list
        description: "Institutional affiliations"
      relationship_to_wardley:
        type: string
        description: "Nature of professional/intellectual relationship to Wardley"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How complete the profile is"
    ai_instructions: >
      A person in Simon Wardley's professional and intellectual network — collaborator,
      influence, community member, or intellectual source. Wardley's network includes
      practitioners who adopted and extended the mapping framework, government officials
      who implemented his recommendations, and intellectual influences (Sun Tzu, Boyd,
      evolutionary economists).
    display:
      icon: user
      layout: record

  organization:
    description: "An institution relevant to Wardley's career or thought"
    subdirectory: organizations
    required: [title, org_type]
    optional: [founded, location]
    fields:
      org_type:
        type: select
        values: [company, government, research-lab, community, conference, publisher, consultancy, open-source-project]
        description: "Type of organization"
      founded:
        type: string
        description: "Year founded"
      location:
        type: string
        description: "Location"
    ai_instructions: >
      An institution relevant to Wardley's career, thought, or context. Includes
      companies (Fotango, Canonical), government bodies (GDS, Cabinet Office),
      research organizations (Leading Edge Forum), and community organizations.
    display:
      icon: building
      layout: record

  event:
    description: "A biographical or intellectual milestone"
    subdirectory: events
    required: [title, date]
    optional: [location, participants, status]
    fields:
      date:
        type: date
        description: "When the event occurred"
      location:
        type: string
        description: "Where it took place"
      participants:
        type: list
        description: "People or organizations involved"
      status:
        type: select
        values: [confirmed, approximate, disputed, unknown]
        description: "How certain the details are"
    ai_instructions: >
      A specific event in Wardley's life, career, or intellectual context.
      Includes career moves, framework development milestones, key talks,
      policy papers, and adoption events.
    display:
      icon: calendar
      layout: record

  source:
    description: "A secondary source about Wardley or his work"
    subdirectory: sources
    required: [title, source_type, date]
    optional: [author, url, publication]
    fields:
      source_type:
        type: select
        values: [book, article, chapter, interview, profile, review, dissertation, blog-post, podcast, video, documentary]
        description: "Type of secondary source"
      date:
        type: date
        description: "Publication date"
      author:
        type: string
        description: "Author"
      url:
        type: string
        description: "URL if available"
      publication:
        type: string
        description: "Publication venue"
    ai_instructions: >
      A secondary source about Simon Wardley or his work — profiles, analyses,
      retrospectives, etc. These are references ABOUT Wardley or his framework,
      not BY him. For works by Wardley, use the 'writing' type instead.
    display:
      icon: bookmark
      layout: document

  note:
    description: "Research notes and analysis"
    subdirectory: notes
    required: [title]
    optional: [tags]
    ai_instructions: >
      Research notes, analysis, observations, or commentary. Use for thinking about
      Wardley's work, connections between ideas, research questions, comparisons
      with other frameworks (Boyd, Agre, etc.), and editorial notes.
    display:
      icon: edit
      layout: document

