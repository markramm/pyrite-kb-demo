name: demarco
description: >
  Intellectual biography of Tom DeMarco (b. 1940) and Timothy Lister — software consultants,
  authors, and co-founders of the Atlantic Systems Guild. Covers their argument that major
  software project failures are sociological rather than technical, the Coding War Games
  empirical research, Peopleware's influence on office environments and team dynamics,
  DeMarco's solo work on slack, risk management, and structured methods, and their
  connections to Weinberg, the Agile movement, and lean thinking.
kb_type: intellectual-biography

guidelines:
  contributing: |
    This is a dual-subject KB — DeMarco and Lister are co-authors of the core works but
    DeMarco has a substantial solo bibliography (structured methods, Slack, novels). Clearly
    attribute ideas to the right author(s). The Coding War Games data is their empirical
    foundation — cite it accurately and distinguish between their original findings and
    later interpretations. The Atlantic Systems Guild members (Steve McMenamin, James and
    Suzanne Robertson, Peter Hruschka, John Palmer) are co-authors on some works
    and should be properly credited. Larry Constantine co-authored Adrenaline Junkies
    with Guild members but was not a founding Guild member.
  quality: |
    Entries should distinguish between Peopleware's specific claims (backed by Coding War
    Games data) and its broader cultural influence on the Agile movement. Many of DeMarco
    and Lister's ideas have been absorbed into conventional wisdom — entries should trace
    the original argument, not the received version. DeMarco's intellectual evolution is
    notable: his 2009 IEEE essay "Software Engineering: An Idea Whose Time Has Come and
    Gone" publicly questioned whether the discipline he helped create had delivered on its
    promises. This self-critical arc should be documented.
  voice: |
    Direct and empirical. DeMarco and Lister write with dry humor and a practitioner's
    skepticism toward management fads — the KB should reflect that tone. Respect the
    data-driven arguments while noting where the claims have been challenged or
    superseded.

goals:
  primary: |
    Build a complete intellectual biography covering DeMarco and Lister's writings, key
    concepts (Peopleware thesis, Coding War Games, team jell, slack, flow in the workplace),
    their professional network (Atlantic Systems Guild, structured methods community), and
    their influence on software management, Agile thinking, and organizational design.
  success_criteria: |
    A reader can trace the arc from structured methods through Peopleware to the Slack
    argument, understanding how DeMarco and Lister's empirical and humanistic approach
    to software development influenced and was influenced by adjacent traditions
    (Weinberg, Deming, Agile, lean).

evaluation_rubric:
  - "Writing entries include date, writing_type, and correct author attribution (DeMarco solo, Lister solo, or co-authored)"
  - "Concept entries trace origin to specific works and distinguish original claims from later interpretations"
  - "Coding War Games claims cite the study and its methodology, not just the conclusions"
  - "People entries describe specific intellectual relationships, not just biographical facts"
  - "Connections to Weinberg, Agile, lean, and flow traditions are documented where they exist"
  - "DeMarco's intellectual evolution (including self-critique) is represented"

types:
  writing:
    description: "A work by DeMarco, Lister, or both — book, paper, essay, column, or novel"
    subdirectory: writings
    required: [title, writing_type, date]
    optional: [coauthors, publisher, url, key_concepts, research_status]
    fields:
      writing_type:
        type: select
        values: [book, paper, essay, column, novel, report, talk, foreword, interview, workbook]
        description: "Type of writing"
      date:
        type: date
        description: "Publication date"
      coauthors:
        type: list
        description: "Co-authors (entry IDs or names)"
      publisher:
        type: string
        description: "Publisher or venue"
      url:
        type: string
        description: "URL to full text if available"
      key_concepts:
        type: list
        description: "Concepts developed or discussed (entry IDs from concepts/)"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A work by Tom DeMarco, Timothy Lister, or both. DeMarco has a much larger solo
      bibliography than Lister — properly attribute authorship. Their co-authored works
      are Peopleware (1987, 1999, 2013), Waltzing with Bears (2003), and Adrenaline
      Junkies and Template Zombies (2008, with other Guild members). DeMarco's solo works
      span structured methods (1970s-80s), project management, business novels, and
      organizational dynamics. For books, explain the argument and where it fits in the
      intellectual arc. Importance: 10=Peopleware; 8-9=major solo works (Slack, Structured
      Analysis); 6-7=significant supporting works; 4-5=minor works.
    evaluation_rubric:
      - "Writing has date and writing_type"
      - "Authorship is correctly attributed (solo vs co-authored)"
      - "Body explains significance, not just contents"
    display:
      icon: file-text
      layout: document

  concept:
    description: "A key idea, framework, or empirical finding from DeMarco and Lister's work"
    subdirectory: concepts
    required: [title]
    optional: [first_appeared, key_writings, related_concepts, research_status]
    fields:
      first_appeared:
        type: string
        description: "Writing or approximate date where this concept first appears"
      key_writings:
        type: list
        description: "Writings where this concept is developed (entry IDs)"
      related_concepts:
        type: list
        description: "Related concepts (entry IDs)"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A key idea or empirical finding from DeMarco and Lister's work. Major concepts
      include: the Peopleware thesis (software problems are sociological), team jell,
      the office environment effect, flow state and interruption cost, Coding War Games
      findings, slack, the Spanish Theory of management, furniture police, organizational
      learning disability, and risk management as risk embracement. Trace each concept
      to its first appearance and show how it evolved. Connect to the Coding War Games
      data where relevant — many Peopleware claims have an empirical foundation that
      entries should reference.
    evaluation_rubric:
      - "Concept traces origin to specific work or date"
      - "Empirical claims reference the Coding War Games or other evidence"
      - "Connections to other concepts are explicit via wikilinks"
    display:
      icon: lightbulb
      layout: document

  era:
    description: "A period in DeMarco and Lister's intellectual or professional development"
    subdirectory: eras
    required: [title, date_range]
    optional: [key_writings, key_concepts, affiliations]
    fields:
      date_range:
        type: string
        description: "Time span, e.g. '1975-1987'"
      key_writings:
        type: list
        description: "Important writings from this period"
      key_concepts:
        type: list
        description: "Concepts developed during this period"
      affiliations:
        type: list
        description: "Institutional affiliations during this period"
    ai_instructions: >
      A period in DeMarco and Lister's intellectual development. Key eras include:
      the structured methods period (1970s-early 1980s), the Peopleware breakthrough
      (mid-1980s through 1990s), the organizational dynamics period (late 1990s-2000s
      with Slack, Waltzing with Bears), and the reflective/self-critical period
      (2009-present, including the IEEE recantation essay).
    display:
      icon: clock
      layout: document

  person:
    description: "An individual in DeMarco and Lister's intellectual and professional network"
    subdirectory: people
    required: [title, role]
    optional: [affiliations, relationship_to_subjects, research_status]
    fields:
      role:
        type: string
        description: "Primary role or position"
      affiliations:
        type: list
        description: "Institutional affiliations"
      relationship_to_subjects:
        type: string
        description: "Nature of relationship to DeMarco and/or Lister"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How complete the profile is"
    ai_instructions: >
      A person in DeMarco and Lister's professional and intellectual network. The
      Atlantic Systems Guild is the central institutional context — its members
      (McMenamin, Robertson, Hruschka, Palmer) are key figures. Constantine is a co-author of Adrenaline Junkies but not a Guild member. Also include
      intellectual predecessors (Weinberg, Brooks), Agile movement figures who drew
      on Peopleware, and critics. Describe specific intellectual relationships.
    evaluation_rubric:
      - "Role field accurately describes the person's function"
      - "Relationship to DeMarco/Lister is specific"
      - "Body includes the person's own contributions"
    display:
      icon: user
      layout: record

  organization:
    description: "An institution relevant to DeMarco and Lister's career or thought"
    subdirectory: organizations
    required: [title, org_type]
    optional: [founded, location, url]
    fields:
      org_type:
        type: select
        values: [consultancy, professional-society, publisher, conference, university, company, standards-body]
        description: "Type of organization"
      founded:
        type: string
        description: "Year founded"
      location:
        type: string
        description: "Location"
      url:
        type: string
        description: "URL"
    ai_instructions: >
      An institution relevant to DeMarco and Lister's career. The Atlantic Systems
      Guild is the most important — their collaborative consultancy. Also include
      publishers (Dorset House, Addison-Wesley), professional societies (IEEE, ACM),
      and consulting clients or partner organizations where relevant.
    display:
      icon: building
      layout: record

  event:
    description: "A significant event in DeMarco and Lister's career or in software engineering history"
    subdirectory: events
    required: [title, date]
    optional: [location, participants, status]
    fields:
      date:
        type: date
        description: "When the event occurred"
      location:
        type: string
        description: "Where it took place"
      participants:
        type: list
        description: "People or organizations involved"
      status:
        type: select
        values: [confirmed, approximate, disputed, unknown]
        description: "How certain the details are"
    ai_instructions: >
      A specific event relevant to DeMarco and Lister's intellectual biography.
      Includes publication milestones, the founding of the Atlantic Systems Guild,
      key conferences, the Coding War Games study periods, and DeMarco's 2009
      IEEE recantation essay.
    display:
      icon: calendar
      layout: record

  source:
    description: "A secondary source about DeMarco, Lister, or their work"
    subdirectory: sources
    required: [title, source_type, date]
    optional: [author, url, publication]
    fields:
      source_type:
        type: select
        values: [book, article, chapter, interview, profile, review, dissertation, blog-post, podcast, academic-paper]
        description: "Type of secondary source"
      date:
        type: date
        description: "Publication date"
      author:
        type: string
        description: "Author"
      url:
        type: string
        description: "URL if available"
      publication:
        type: string
        description: "Publication venue"
    ai_instructions: >
      A secondary source about DeMarco, Lister, or their work. Includes reviews
      of Peopleware, profiles, interviews, and academic analyses of the Coding War
      Games methodology. For works by DeMarco or Lister, use the 'writing' type.
    display:
      icon: bookmark
      layout: document

  note:
    description: "Research notes and analysis"
    subdirectory: notes
    required: [title]
    optional: [tags]
    ai_instructions: >
      Research notes, analysis, or commentary about DeMarco and Lister's work
      and intellectual world.
    display:
      icon: edit
      layout: document

relationship_types:
  # Intellectual
  influenced_by: "Intellectually influenced by"
  influenced: "Intellectually influenced"
  develops: "Develops or elaborates (concept in writing)"
  developed_in: "Developed in (writing develops concept)"
  builds_on: "Builds on earlier work"
  built_upon_by: "Built upon by later work"
  critiques: "Critiques or argues against"
  critiqued_by: "Critiqued by"
  responds_to: "Responds to or engages with"
  collaborates_with: "Collaborates with"
  mentored: "Mentored"
  mentored_by: "Mentored by"
  extends: "Extends or develops further"

  # Institutional
  authored: "Authored"
  authored_by: "Authored by"
  coauthored: "Co-authored with"
  affiliated_with: "Affiliated with"
  member_of: "Member of"
  employed_by: "Employed by"
  founded: "Founded"
  published_by: "Published by"

  # Structural
  is_part_of: "Part of a larger whole"
  contains_part: "Contains a part"
  related_to: "Generally related"
  wikilink: "Inline wikilink reference"
  wikilinked_by: "Referenced by inline wikilink"

policies:
  qa_on_write: true
