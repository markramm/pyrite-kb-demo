# === Boyd ===
- source: security-mindset
  target: ooda-loop
  target_kb: boyd
  relation: related_to
  note: "Both are adversarial cognitive frameworks. OODA models operating inside an adversary's decision cycle; security mindset asks how systems can be made to fail"

- source: security-mindset
  target: orientation
  target_kb: boyd
  relation: related_to
  note: "Orientation is OODA's central element; Schneier's security mindset is a specific orientation trained to see failure modes rather than intended functions"

- source: threat-modeling
  target: ooda-loop
  target_kb: boyd
  relation: related_to
  note: "Threat modeling operationalizes adversarial thinking; OODA is the adversary's decision structure that threat modeling attempts to predict and disrupt"

- source: threat-modeling
  target: destruction-and-creation-concept
  target_kb: boyd
  relation: related_to
  note: "Threat modeling requires destroying and rebuilding models as adversaries adapt — Boyd's destruction-and-creation epistemology applied to security"

- source: security-is-a-process
  target: ooda-loop
  target_kb: boyd
  relation: related_to
  note: "Both reject static achievement in favor of continuous adaptive cycles. 'Process not a product' is the security version of Boyd's argument that tempo beats position"

- source: hacking-as-systems-subversion
  target: fast-transients
  target_kb: boyd
  relation: related_to
  note: "Fast transients — winning through rapid unpredictable state changes — formalizes the hacker advantage: exploiting orientation gaps before the adversary can adapt"

