# deming → boyd

- source: pdsa-cycle-plan-do-study-act
  target: ooda-loop
  target_kb: boyd
  relation: parallel_to
  note: "Parallel iterative learning cycles that emerged independently. Both treat the cognitive step (Study in PDSA, Orient in OODA) as critical. Deming's cycle is epistemic — about prediction and knowledge generation; Boyd's is competitive — about adaptation rate relative to an adversary."

- source: system-of-profound-knowledge
  target: orientation
  target_kb: boyd
  relation: parallel_to
  note: "Both frameworks center on how the quality of mental models determines the quality of action. SoPK's theory-of-knowledge component insists that there is no action without theory; Boyd's orientation is the lens through which all observation is filtered."

- source: appreciation-for-a-system
  target: destruction-and-creation-concept
  target_kb: boyd
  relation: parallel_to
  note: "Both address how to understand complex wholes. Deming emphasizes seeing interdependencies; Boyd emphasizes continuously decomposing and resynthesizing mental models of systems."

- source: common-cause-vs-special-cause-variation
  target: orientation
  target_kb: boyd
  relation: parallel_to
  note: "Deming's distinction between common-cause and special-cause variation is a framework for correct orientation. Misidentifying common cause as special cause — treating system noise as signal — is an orientation failure Boyd would recognize as a mental model mismatch."

- source: system-of-profound-knowledge
  target: patterns-of-conflict
  target_kb: boyd
  relation: parallel_to
  note: "Both are grand syntheses providing unified frameworks for complex adaptive situations. Deming's domain is organizational management; Boyd's is strategic conflict. Both insist on systemic, not reductionist, thinking."

- source: pdsa-ooda-parallel-iterative-learning-cycles-across-domains
  target: ooda-loop
  target_kb: boyd
  relation: parallel_to
  note: "The deming KB's explicit PDSA-OODA parallel analysis note connects directly to Boyd's OODA loop entry."

# deming → richards

- source: toyota-production-system
  target: boyd-toyota-connection
  target_kb: richards
  relation: related_to
  note: "Richards argues that TPS demonstrates Boyd's organizational climate and tempo framework. Toyota's sustained advantage is explained by its OODA-loop learning rate — the environment Deming's quality philosophy helped create."

- source: pdsa-cycle-plan-do-study-act
  target: ooda-based-competition
  target_kb: richards
  relation: related_to
  note: "Deming's PDSA is the quality-management implementation of what Richards calls OODA-based competition. Both describe competitive advantage through superior learning and adaptation rate."

- source: taiichi-ohno
  target: boyd-toyota-connection
  target_kb: richards
  relation: related_to
  note: "Ohno is the bridge figure: he received Deming's quality philosophy through JUSE and transformed it into TPS, which Richards reads through Boyd's framework as decades-long OODA-based competition."

- source: lean-manufacturing
  target: boyd-toyota-connection
  target_kb: richards
  relation: related_to
  note: "The global lean movement propagated TPS practices without necessarily propagating the organizational climate that made them effective — exactly the limitation Richards' Boyd-Toyota analysis explains."

