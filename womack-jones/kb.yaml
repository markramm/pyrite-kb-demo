name: womack-jones
description: >
  Intellectual biography of James P. Womack (b. 1948) and Daniel T. Jones —
  the researchers who coined "Lean" and codified Toyota's methods for Western
  audiences. Covers the MIT International Motor Vehicle Program, "The Machine
  That Changed the World" (1990), "Lean Thinking" (1996), the five lean
  principles (Value, Value Stream, Flow, Pull, Perfection), the Lean Enterprise
  Institute, Value Stream Mapping, and the transmission chain from TPS through
  Lean to software, startups, and DevOps.
kb_type: intellectual-biography

guidelines:
  contributing: |
    Womack and Jones are translators, not inventors. The practices they documented
    originated with Ohno, Shingo, and Toyota. Always distinguish between what TPS
    practitioners created and what Womack/Jones named, codified, and transmitted.
    "The Machine That Changed the World" was co-authored with Daniel Roos — do not
    omit him. The MIT IMVP study involved a large research team — attribute
    appropriately. For TPS foundations, the tps KB is the upstream source. For
    downstream transmission (Lean Software, Lean Startup), the poppendiecks and
    blank KBs cover those translations.
  quality: |
    Womack and Jones's core contribution is translation and codification: they made
    TPS legible outside Toyota and Japan. Entries should capture this translation
    function — what was the original TPS practice, how did Womack/Jones frame it
    for Western managers, and what was gained or lost in translation? The five
    principles (Value, Value Stream, Flow, Pull, Perfection) are an abstraction
    of TPS, not a description of it — this distinction matters. Value Stream
    Mapping is their most enduring diagnostic tool. The naming itself ("Lean")
    shaped how entire industries understood manufacturing reform.
  voice: |
    Analytical and historically grounded. Womack and Jones write as researchers
    and advocates, not as practitioners — the KB should reflect this academic-
    to-applied orientation. Treat their work with respect while noting the
    critiques (abstraction from context, loss of Toyota's cultural specifics,
    overextension of manufacturing metaphors to knowledge work).

goals:
  primary: |
    Build an intellectual biography of Womack and Jones covering their research
    career, major publications, the five lean principles, the Lean Enterprise
    Institute, and their role as the critical translation layer between TPS and
    the global lean movement. The KB should make explicit how Toyota's practices
    were transformed into a portable framework and trace the downstream
    transmission to software, startups, and healthcare.
  success_criteria: |
    A reader can trace how specific TPS practices were abstracted into Lean
    principles by Womack and Jones, and how those principles were subsequently
    adapted by others (Poppendiecks for software, Ries for startups). Cross-
    references to tps, deming, and poppendiecks KBs show the full transmission
    chain. The KB documents what the "Lean" framing captured and what it missed.

evaluation_rubric:
  - "Entry distinguishes between TPS original practice and Womack/Jones's Lean codification"
  - "The five principles are referenced accurately and traced to their TPS roots"
  - "Writing entries explain the research methodology and audience, not just content"
  - "People entries describe their role in the TPS-to-Lean translation chain"
  - "Cross-KB connections to tps, deming, and poppendiecks are noted where relevant"
  - "Critiques of Lean abstraction are documented alongside the framework itself"

types:
  writing:
    description: "A work by or co-authored by Womack and/or Jones"
    subdirectory: writings
    required: [title, writing_type, date]
    optional: [publication, url, coauthors, key_concepts, research_status]
    fields:
      writing_type:
        type: select
        values: [book, article, report, paper, presentation, foreword, column, workbook, interview]
        description: "Type of writing"
      date:
        type: date
        description: "Publication or presentation date"
      publication:
        type: string
        description: "Publisher or venue"
      url:
        type: string
        description: "URL to the work if available"
      coauthors:
        type: list
        description: "Co-authors"
      key_concepts:
        type: list
        description: "Concepts developed or discussed (entry IDs)"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A work by Womack and/or Jones. Their major works are "The Machine That
      Changed the World" (1990, with Daniel Roos), "Lean Thinking" (1996),
      "Lean Solutions" (2005), and "Seeing the Whole" (2002). Womack also
      writes a regular column/e-letter. For each work, explain what TPS
      concepts are being translated, what the target audience is, and how
      the Lean framing abstracts from the Toyota original.
    evaluation_rubric:
      - "Co-authors are listed completely"
      - "TPS concepts being translated are identified"
      - "Target audience and purpose are stated"
    display:
      icon: file-text
      layout: document

  concept:
    description: "A key idea, principle, or framework from Womack and Jones's work"
    subdirectory: concepts
    required: [title]
    optional: [first_appeared, key_writings, related_concepts, tps_source, application_domain, research_status]
    fields:
      first_appeared:
        type: string
        description: "Writing or approximate date where this concept first appears"
      key_writings:
        type: list
        description: "Writings where this concept is developed (entry IDs)"
      related_concepts:
        type: list
        description: "Related concepts (entry IDs)"
      tps_source:
        type: string
        description: "The TPS/Toyota practice this abstracts from, or 'original' if novel to Womack/Jones"
      application_domain:
        type: select
        values: [manufacturing, lean-management, healthcare, software, general]
        description: "Primary domain of application"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How thoroughly this entry has been researched"
    ai_instructions: >
      A key idea from Womack and Jones's Lean framework. Their core contribution
      is abstracting TPS practices into portable principles. For each concept,
      document: (1) the TPS practice it draws from (use tps_source field),
      (2) how Womack/Jones frame it differently from the Toyota original,
      (3) how the concept has been adopted or adapted downstream. The five
      principles (Value, Value Stream, Flow, Pull, Perfection) are the
      intellectual backbone. Value Stream Mapping is the most important
      diagnostic tool. Note where abstraction from TPS context changes the
      concept's meaning or applicability.
    evaluation_rubric:
      - "Identifies the upstream TPS practice via tps_source"
      - "Explains what changes in Womack/Jones's abstraction"
      - "Notes downstream adoption or adaptation"
    display:
      icon: lightbulb
      layout: document

  era:
    description: "A period in Womack and Jones's intellectual or professional development"
    subdirectory: eras
    required: [title, date_range]
    optional: [key_writings, key_concepts, affiliations, primary_focus]
    fields:
      date_range:
        type: string
        description: "Time span, e.g. '1985-1990'"
      key_writings:
        type: list
        description: "Important writings from this period"
      key_concepts:
        type: list
        description: "Concepts developed during this period"
      affiliations:
        type: list
        description: "Institutional affiliations during this period"
      primary_focus:
        type: string
        description: "Primary intellectual focus during this era"
    ai_instructions: >
      A period in Womack and/or Jones's career. Key transitions include:
      the MIT IMVP research period, the post-Machine publication era,
      founding of LEI/LAI, the Lean Thinking codification, and the expansion
      beyond manufacturing. Each era should capture what they were studying,
      who they were writing for, and how their understanding of Lean evolved.
    display:
      icon: clock
      layout: document

  person:
    description: "An individual in Womack and Jones's intellectual and professional network"
    subdirectory: people
    required: [title, role]
    optional: [affiliations, relationship_to_subjects, dates, research_status]
    fields:
      role:
        type: string
        description: "Primary role or position"
      affiliations:
        type: list
        description: "Institutional affiliations"
      relationship_to_subjects:
        type: string
        description: "Nature of relationship to Womack and/or Jones"
      dates:
        type: string
        description: "Relevant date range"
      research_status:
        type: select
        values: [stub, partial, draft, complete]
        description: "How complete the profile is"
    ai_instructions: >
      A person in Womack and Jones's network. This includes MIT IMVP
      researchers (Daniel Roos, John Krafcik), TPS practitioners they
      studied (Ohno, Shingo, Fujio Cho), downstream translators
      (Poppendiecks, Ries, Liker), and institutional collaborators.
      Describe their specific role in the Lean transmission chain.
    evaluation_rubric:
      - "Role in the TPS-to-Lean or Lean-to-X transmission is stated"
      - "Relationship to Womack/Jones specifically, not just to Lean generally"
    display:
      icon: user
      layout: record

  organization:
    description: "An institution relevant to Womack, Jones, or the Lean movement"
    subdirectory: organizations
    required: [title, org_type]
    optional: [founded, location, url, key_people]
    fields:
      org_type:
        type: select
        values: [research-institute, nonprofit, consulting-firm, publisher, conference, university, automotive-company, lean-organization]
        description: "Type of organization"
      founded:
        type: string
        description: "Year founded"
      location:
        type: string
        description: "Location"
      url:
        type: string
        description: "URL"
      key_people:
        type: list
        description: "Key people associated (entry IDs)"
    ai_instructions: >
      An institution in the Lean ecosystem. Includes the MIT IMVP, the Lean
      Enterprise Institute (Womack's organization), the Lean Enterprise
      Academy (Jones's UK organization), Toyota, and downstream Lean
      institutions. Note the institution's role in the Lean transmission
      chain — research, codification, or dissemination.
    display:
      icon: building
      layout: record

  event:
    description: "A milestone in the Lean movement or Womack/Jones's career"
    subdirectory: events
    required: [title, date]
    optional: [location, participants, status]
    fields:
      date:
        type: date
        description: "When the event occurred"
      location:
        type: string
        description: "Where it took place"
      participants:
        type: list
        description: "People or organizations involved"
      status:
        type: select
        values: [confirmed, approximate, disputed, unknown]
        description: "How certain the details are"
    ai_instructions: >
      A milestone in the Lean movement or in Womack/Jones's career. Includes
      publication events, founding of institutions, landmark studies, keynote
      presentations, and moments where Lean thinking crossed into new domains.
    display:
      icon: calendar
      layout: record

  source:
    description: "A secondary source about Womack, Jones, or the Lean movement"
    subdirectory: sources
    required: [title, source_type, date]
    optional: [author, url, publication]
    fields:
      source_type:
        type: select
        values: [book, article, profile, interview, podcast, review, blog-post, academic-paper, chapter, documentary]
        description: "Type of secondary source"
      date:
        type: date
        description: "Publication date"
      author:
        type: string
        description: "Author"
      url:
        type: string
        description: "URL if available"
      publication:
        type: string
        description: "Publication venue"
    ai_instructions: >
      A secondary source about Womack, Jones, or their Lean framework —
      reviews, interviews, academic analyses, critiques, profiles. These
      are references ABOUT the subjects, not BY them (use 'writing' for
      Womack/Jones's own work). Include critical perspectives on Lean
      abstraction and overextension.
    display:
      icon: bookmark
      layout: document

  note:
    description: "Research notes, analysis, and editorial observations"
    subdirectory: notes
    required: [title]
    optional: [tags]
    ai_instructions: >
      Research notes, analysis, or commentary about Womack and Jones's
      work and its connections. Use for cross-KB analysis (the TPS-to-Lean
      transmission chain), research questions, critiques, and observations
      about how Lean thinking transforms across domains.
    display:
      icon: edit
      layout: document

relationship_types:
  # Intellectual
  influenced_by: "Intellectually influenced by"
  influenced: "Intellectually influenced"
  codifies: "Codifies or names an existing practice"
  codified_by: "Codified or named by"
  adapts: "Adapts concept from one domain to another"
  adapted_by: "Adapted by"
  develops: "Develops or elaborates (concept in writing)"
  developed_in: "Developed in (writing develops concept)"
  builds_on: "Builds on earlier work"
  built_upon_by: "Built upon by later work"
  critiques: "Critiques or argues against"
  critiqued_by: "Critiqued by"
  extends: "Extends a framework or concept"
  extended_by: "Extended by"
  collaborates_with: "Collaborates with"

  # Standard
  authored: "Authored"
  authored_by: "Authored by"
  coauthored: "Co-authored with"
  affiliated_with: "Affiliated with"
  employed_by: "Employed by"
  member_of: "Member of"
  published_in: "Published in"
  presented_at: "Presented at"
  is_part_of: "Part of a larger whole"
  contains_part: "Contains a part"
  related_to: "Generally related"
  wikilink: "Inline wikilink reference"
  wikilinked_by: "Referenced by inline wikilink"

policies:
  qa_on_write: true
